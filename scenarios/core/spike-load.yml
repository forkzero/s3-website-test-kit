scenarios:
  - name: "Spike test - mixed requests"
    weight: 80
    flow:
      - get:
          url: "/index.html"
          expect:
            - statusCode: 200
      - get:
          url: "/test1m.tmp"
          expect:
            - statusCode: 200

  - name: "Spike test - range requests"
    weight: 15
    flow:
      - get:
          url: "/large.bin"
          headers:
            'range': "bytes=0-99"
          expect:
            - statusCode: 206

  - name: "Spike test - special characters"
    weight: 3
    flow:
      - get:
          # Percent-encoded (encodeURIComponent); raw URL delimiters (? # space)
          # and S3-significant chars (+ reads as space) would hit a wrong key -> 404.
          # Decodes to: specialCharacters!-_.*'()&$@=;:+  ,?\{^}%`]">[~<#|.
          url: "/specialCharacters!-_.*'()%26%24%40%3D%3B%3A%2B%20%20%2C%3F%5C%7B%5E%7D%25%60%5D%22%3E%5B~%3C%23%7C."
          expect:
            - statusCode: 200
